name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish src\KeyR.csproj -c Release -r win-x64 -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --self-contained false -p:DebugType=none -p:DebugSymbols=false -p:Product=KeyR -p:Title=KeyR -p:AssemblyTitle=KeyR -o build_output

      - name: Rename Executable
        run: |
          $tag = "${{ github.ref_name }}"
          $newName = "KeyR_${tag}_win_x64.exe"
          if (Test-Path "build_output\SupTask.exe") { Rename-Item "build_output\SupTask.exe" $newName }
          elseif (Test-Path "build_output\KeyR.exe") { Rename-Item "build_output\KeyR.exe" $newName }

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v1
        with:
          files: build_output\KeyR_*_win_x64.exe
          prerelease: true
          name: "KeyR ${{ github.ref_name }} Beta"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
