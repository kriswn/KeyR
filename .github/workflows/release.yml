name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish src\KeyR.csproj -c Release -r win-x64 -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --self-contained false -p:DebugType=none -p:DebugSymbols=false -p:Product=KeyR -p:Title=KeyR -p:AssemblyTitle=KeyR -o build_output

      - name: Rename Executable
        run: |
          $tag = "${{ github.ref_name }}"
          Rename-Item "build_output\SupTask.exe" "build_output\KeyR_$tag_win_x64.exe" -ErrorAction SilentlyContinue
          Rename-Item "build_output\KeyR.exe" "build_output\KeyR_$tag_win_x64.exe" -ErrorAction SilentlyContinue

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build_output\KeyR_*_win_x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
