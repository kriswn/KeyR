name: Update Releases
on: [push]
jobs:
  update-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Update Release Notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # First, ensure v0.3.4 is created or updated as prerelease
          gh release create v0.3.4 --title "KeyR v0.3.4 Beta" --notes "Fixed bugs with importing foreign macros. Imported macros now automatically detect your screen and center perfectly without glitching." --prerelease || \
          gh release edit v0.3.4 --title "KeyR v0.3.4 Beta" --notes "Fixed bugs with importing foreign macros. Imported macros now automatically detect your screen and center perfectly without glitching." --prerelease
          
          # Update v0.3.3
          gh release edit v0.3.3 --title "KeyR v0.3.3 Beta" --notes "Officially rebranded from SupTask to KeyR! Added a smart startup check to prevent crashes by ensuring your PC has the necessary Windows updates." --prerelease
          
          # Update v0.3.2
          gh release edit v0.3.2 --title "KeyR v0.3.2 Beta" --notes "Completely rebuilt how the program records your mouse and keyboard clicks. Fixed issues where some keys or fast movements wouldn't record correctly." --prerelease
          
          # Update v0.3.1
          gh release edit v0.3.1 --title "KeyR v0.3.1 Beta" --notes "Added the ability to import InformaalTask and TinyTask macros. Redesigned toggles and dropdowns in the settings menu for a cleaner look." --prerelease
          
          # Update v0.3.0
          gh release edit v0.3.0 --title "KeyR v0.3.0 Beta" --notes "Completely redesigned the Settings Window from the ground up. Added a modern Dark Mode theme and a helpful search bar to find exactly what you need." --prerelease
          
          # Update v0.2.0
          gh release edit v0.2.0 --title "KeyR v0.2.0 Beta" --notes "Added new features that let the macro 'see' your screen and react to images or text. Created rules so your macro can repeat or wait precisely when needed." --prerelease
          
          # Update v0.1.2
          gh release edit v0.1.2 --title "KeyR v0.1.2 Beta" --notes "Optimized playback so everything runs incredibly smooth without lagging your PC. Greatly reduced the app's size to keep it extremely fast and lightweight." --prerelease
          
          # Update v0.1.1
          gh release edit v0.1.1 --title "KeyR v0.1.1 Beta" --notes "Added an 'Always on Top' mode to keep the app visible while you record. The app now remembers your screen position and settings when you close it." --prerelease
          
          # Update v0.1.0
          gh release edit v0.1.0 --title "KeyR v0.1.0 Beta" --notes "The Initial Release! Record and replay mouse and keyboard actions with zero programming needed. Set custom hotkeys and control playback speed up to 10x!" --prerelease
